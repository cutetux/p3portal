name: Build & Push Container Image

# Triggert bei jedem Tag-Push der Form vX.Y.Z(-beta...).
# Baut Plus- und Core-Edition parallel und pusht beide nach ghcr.io.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core ist der Default — bekommt :<version>, :latest und :core
          - edition: core
            version_suffix: ""
            moving_tags: |
              latest
              core
          # Plus ist opt-in — bekommt :<version>-plus und :plus
          - edition: plus
            version_suffix: "-plus"
            moving_tags: |
              plus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image reference (lowercase owner)
        id: ref
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${GITHUB_REF_NAME#v}"
          echo "image=ghcr.io/${OWNER_LC}/p3portal" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build tag list
        id: tags
        run: |
          IMAGE="${{ steps.ref.outputs.image }}"
          VERSION="${{ steps.ref.outputs.version }}"
          SUFFIX="${{ matrix.version_suffix }}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}${SUFFIX}"
            while IFS= read -r t; do
              [ -n "$t" ] && echo "${IMAGE}:${t}"
            done <<< "${{ matrix.moving_tags }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.edition }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            EDITION=${{ matrix.edition }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=P3 Portal (${{ matrix.edition }})
            org.opencontainers.image.version=${{ steps.ref.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=${{ matrix.edition == 'core' && 'AGPL-3.0-or-later' || 'AGPL-3.0-or-later AND LicenseRef-P3-Plus' }}
          cache-from: type=gha,scope=${{ matrix.edition }}
          cache-to: type=gha,mode=max,scope=${{ matrix.edition }}
