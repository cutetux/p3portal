#_preseed_V1
# P3 Portal starter pack: minimal Debian 13 preseed.
# en_US / UTC defaults — change locale/timezone in your own copy if needed.

d-i auto-install/enable boolean true
d-i debconf/priority select critical

# Locale / keyboard / clock
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Network — DHCP by default. When the .pkr.hcl passes static netcfg params on the
# kernel cmdline (ip_address set), those run before this file is fetched and take
# precedence; no explicit use_dhcp here so static mode isn't overridden.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian-tmpl
d-i netcfg/get_domain string localdomain

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Partitioning — simple single-disk layout
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Root account — placeholder password, removed in provisioner after install
d-i passwd/root-login boolean true
d-i passwd/root-password password p3starter
d-i passwd/root-password-again password p3starter
d-i passwd/make-user boolean false

# Packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select none
d-i pkgsel/install-language-support boolean false
popularity-contest popularity-contest/participate boolean false

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Finish
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true

# Allow root login via password during Packer build (cleared afterwards)
d-i preseed/late_command string \
  in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
